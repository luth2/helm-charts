name: Build And Publish Base Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Container/base-image/Dockerfile
      - .github/workflows/base-image-ghcr.yml

concurrency:
  group: base-image-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eccosp-base
  IMAGE_REF_SHA: ghcr.io/${{ github.repository_owner }}/eccosp-base:sha-${{ github.sha }}

jobs:
  build-push-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./Container/base-image
          file: ./Container/base-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=sha-${{ github.sha }}
          sbom: false
          provenance: false

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REF_SHA }}
          format: spdx-json
          output-file: eccosp-base-sbom.spdx.json
          upload-artifact: true
          artifact-name: eccosp-base-sbom

      - name: Debug SBOM file
        run: |
          set -euo pipefail
          echo "Working directory: $PWD"
          ls -lah
          test -f eccosp-base-sbom.spdx.json
          echo "SBOM file details:"
          ls -lh eccosp-base-sbom.spdx.json
          echo "SBOM checksum:"
          sha256sum eccosp-base-sbom.spdx.json

      - name: Preview SBOM content
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("eccosp-base-sbom.spdx.json")
          data = json.loads(path.read_text())

          print("Top-level keys:", sorted(data.keys()))
          print("SPDX ID:", data.get("SPDXID"))
          print("Document name:", data.get("name"))
          print("Document namespace:", data.get("documentNamespace"))

          packages = data.get("packages", [])
          relationships = data.get("relationships", [])
          print("Package count:", len(packages))
          print("Relationship count:", len(relationships))

          for index, package in enumerate(packages[:20], start=1):
              print(f"Package {index}: {package.get('name')} {package.get('versionInfo')}")
          PY

      - name: Upload raw SBOM preview to job summary
        run: |
          {
            echo "## SBOM Debug"
            echo
            echo "File: eccosp-base-sbom.spdx.json"
            echo
            echo '```json'
            python -m json.tool eccosp-base-sbom.spdx.json | sed -n '1,160p'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Submit SBOM to dependency graph
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          filePath: eccosp-base-sbom.spdx.json

      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF_SHA }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload CVE scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Upload CVE scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: eccosp-base-trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: error