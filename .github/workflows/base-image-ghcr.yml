name: Build And Publish Base Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Container/base-image/Dockerfile
      - .github/workflows/base-image-ghcr.yml

concurrency:
  group: base-image-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eccosp-base
  IMAGE_REF_SHA: ghcr.io/${{ github.repository_owner }}/eccosp-base:sha-${{ github.sha }}

jobs:
  build-push-scan:
    outputs:
      image_ref: ${{ steps.image_ref.outputs.ref }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./Container/base-image
          file: ./Container/base-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=sha-${{ github.sha }}
          sbom: false
          provenance: false

      - name: Define immutable image reference
        id: image_ref
        run: |
          set -euo pipefail
          echo "ref=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Add build summary
        run: |
          set -euo pipefail
          docker buildx imagetools inspect --raw "${{ steps.image_ref.outputs.ref }}" > image-manifest.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("image-manifest.json").read_text())
          total_size = manifest.get("config", {}).get("size", 0)
          total_size += sum(layer.get("size", 0) for layer in manifest.get("layers", []))
          total_size_mb = total_size / (1024 * 1024)

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("## Build Summary\n\n")
              handle.write(f"- Image: `${{ steps.image_ref.outputs.ref }}`\n")
              handle.write(f"- Digest: `${{ steps.build.outputs.digest }}`\n")
              handle.write(f"- Approx. compressed image size: `{total_size_mb:.2f} MiB`\n")
          PY

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image_ref.outputs.ref }}
          format: spdx-json
          output-file: eccosp-base-sbom.spdx.json
          upload-artifact: true
          artifact-name: eccosp-base-sbom

      - name: Submit SBOM to dependency graph
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          filePath: eccosp-base-sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.image_ref.outputs.ref }}"

      - name: Attest SBOM to GHCR image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate eccosp-base-sbom.spdx.json \
            --type spdxjson \
            "${{ steps.image_ref.outputs.ref }}"

      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image_ref.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true

      - name: Upload CVE scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload CVE scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: eccosp-base-trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: error

  verify-supply-chain:
    needs: build-push-scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: read

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify container signature
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/base-image-ghcr.yml@.*$" \
            "${{ needs.build-push-scan.outputs.image_ref }}"

      - name: Verify SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign verify-attestation \
            --type spdxjson \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/base-image-ghcr.yml@.*$" \
            "${{ needs.build-push-scan.outputs.image_ref }}" >/dev/null